<body class="bg-gray-50 text-slate-800 font-sans antialiased">

<nav class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
    <div class="flex items-center gap-2 cursor-pointer" onclick="showList()">
      <div class="w-8 h-8 rounded-lg bg-blue-700 flex items-center justify-center text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
      </div>
      <span class="text-xl font-bold text-slate-900 tracking-tight">Capitol<span class="text-blue-700">Trades</span></span>
    </div>
    <div class="flex-1 max-w-lg mx-4 hidden md:block">
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
        <input type="text" id="globalSearch" oninput="filterList()" placeholder="Search politicians, tickers, companies..." class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg leading-5 bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-600 focus:border-transparent text-sm transition">
      </div>
    </div>
  </div>
</nav>

<main id="app" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 fade-in"></main>

<script>
const UPSTREAM = "https://raw.githubusercontent.com/cryptoratsdev/senate-disclosures/main/reports/all.json";
let allPoliticians = [], activePol = null, charts = [];

function fmt(n){if(!n)return'—';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'k';return n.toString()}
function initials(n){return n.split(' ').map(x=>x[0]).join('').substring(0,2).toUpperCase()}
function avatarColor(n){const p=['bg-blue-100 text-blue-700','bg-green-100 text-green-700','bg-purple-100 text-purple-700','bg-orange-100 text-orange-700','bg-pink-100 text-pink-700','bg-indigo-100 text-indigo-700'];let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return p[Math.abs(h)%p.length]}
function parseAmount(a){if(!a)return 0;const m=String(a).match(/\$?([\d,]+(?:\.\d+)?)(?:\s*-\s*\$?([\d,]+(?:\.\d+)?))?/);if(!m)return 0;const l=parseFloat(m[1].replace(/,/g,'')),h=m[2]?parseFloat(m[2].replace(/,/g,'')):l;return(l+h)/2}
function amountWidth(a){if(!a)return 0;const m=a.match(/\$?([\d,]+)\s*-\s*\$?([\d,]+(?:,\d{3})*)/);if(m){const mx=parseInt(m[2].replace(/,/g,''));return Math.min(100,Math.round((mx/1000000)*100))}const s=a.match(/\$?([\d,]+)/);if(s)return Math.min(100,Math.round((parseInt(s[1].replace(/,/g,''))/1000000)*100));return 0}
function daysBetween(p,t){if(!p||!t||p===t)return'—';const a=new Date(p),b=new Date(t);if(isNaN(a)||isNaN(b))return'—';const d=Math.round((a-b)/(864e5));if(d<=0)return'—';const c=d<=30?'text-green-600':d<=45?'text-yellow-600':'text-red-600';return`<span class="${c} font-semibold">${d}d</span>`}

function processData(src){
  const reps=src.all||[];
  const seen=new Set();
  const txs=[];
  reps.forEach(r=>{
    const name=`${r.first_name||''} ${r.last_name||''}`.trim();
    (r.transactions||[]).forEach(t=>{
      const key=`${name}|${t.ticker}|${t.date}|${t.order_type}|${t.amount}`;
      if(seen.has(key))return;
      seen.add(key);
      txs.push({politician:name,date:t.date||'',traded:t.transaction_date||t.date||'',ticker:t.ticker||'-',asset:t.asset_name||t.ticker||'-',order_type:t.order_type||'-',amount:t.amount||'-',volume:parseAmount(t.amount)});
    });
  });
  const pols={};
  txs.forEach(t=>{if(!pols[t.politician])pols[t.politician]={name:t.politician,txs:[]};pols[t.politician].txs.push(t)});
  return Object.values(pols).map(p=>{
    const t=p.txs.sort((a,b)=>new Date(b.date)-new Date(a.date));
    const vol=t.reduce((s,x)=>s+x.volume,0);
    const tv={},yc={};
    t.forEach(x=>{if(x.ticker!=='-')tv[x.ticker]=(tv[x.ticker]||0)+x.volume;const y=(x.date.split('/')[2])||'';if(y)yc[y]=(yc[y]||0)+1});
    const tot=Object.values(tv).reduce((a,b)=>a+b,0)||1;
    const alloc={};Object.entries(tv).forEach(([k,v])=>alloc[k]=Math.round((v/tot)*100));
    const top=Object.entries(tv).sort((a,b)=>b[1]-a[1])[0]?.[0]||'-';
    const years=Object.keys(yc).sort();
    return{name:p.name,trades:t.length,totalVolume:Math.round(vol),lastTrade:t[0]?.date||'',topTicker:top,alloc,years,hist:years.map(y=>yc[y]||0),txs:t};
  }).sort((a,b)=>b.totalVolume-a.totalVolume);
}

async function init(){
  let raw;
  try{const r=await fetch(UPSTREAM);if(!r.ok)throw new Error('bad');raw=await r.json()}
  catch(e){raw=MOCK_RAW}
  allPoliticians=processData(raw);
  showList();
}

function showList(){
  activePol=null;destroyCharts();
  const pols=allPoliticians;
  document.getElementById('app').innerHTML=`
    <div class="mb-6">
      <h1 class="text-2xl font-extrabold text-gray-900">Senate Trade Disclosures</h1>
      <p class="text-sm text-gray-500 mt-1">Track every disclosed transaction by U.S. Senators</p>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6" id="listGrid"></div>
  `;
  renderList(pols);
}

function renderList(list){
  const g=document.getElementById('listGrid');
  g.innerHTML=list.map(p=>{
    const c=avatarColor(p.name), ini=initials(p.name);
    return`
    <div onclick="showProfile('${p.name.replace(/'/g,"\\'")}')" class="bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition cursor-pointer p-6 fade-in">
      <div class="flex items-start justify-between">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-full ${c} flex items-center justify-center text-lg font-bold">${ini}</div>
          <div>
            <h3 class="text-lg font-bold text-gray-900 leading-tight">${p.name}</h3>
            <span class="text-xs text-gray-500 font-medium uppercase tracking-wide">U.S. Senate</span>
          </div>
        </div>
        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </div>
      <div class="mt-5 grid grid-cols-3 gap-4 border-t border-gray-100 pt-4">
        <div><div class="text-xs text-gray-500 uppercase tracking-wide">Volume</div><div class="text-sm font-bold text-gray-900">$${fmt(p.totalVolume)}</div></div>
        <div><div class="text-xs text-gray-500 uppercase tracking-wide">Trades</div><div class="text-sm font-bold text-gray-900">${p.trades}</div></div>
        <div><div class="text-xs text-gray-500 uppercase tracking-wide">Latest</div><div class="text-sm font-bold text-gray-900">${p.lastTrade||'—'}</div></div>
      </div>
    </div>`}).join('');
}

function filterList(){
  const q=document.getElementById('globalSearch').value.toLowerCase().trim();
  const list=q?allPoliticians.filter(p=>p.name.toLowerCase().includes(q)||Object.keys(p.alloc).some(t=>t.toLowerCase().includes(q))):allPoliticians;
  renderList(list);
}

      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      <span class="text-gray-900 font-medium">${p.name}</span>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 fade-in">
      <div class="lg:col-span-3">
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 lg:sticky lg:top-24">
          <div class="w-20 h-20 rounded-full ${c} flex items-center justify-center text-2xl font-bold mx-auto mb-3">${ini}</div>
          <h1 class="text-center text-xl font-extrabold text-gray-900 mb-1">${p.name}</h1>

          <div class="space-y-3">
            <div class="bg-gray-50 rounded-lg p-3 border border-gray-100"><div class="text-xs text-gray-500 uppercase tracking-wide">Volume</div><div class="text-lg font-bold text-gray-900">$${fmt(p.totalVolume)}</div></div>
            <div class="bg-gray-50 rounded-lg p-3 border border-gray-100"><div class="text-xs text-gray-500 uppercase tracking-wide">Trades</div><div class="text-lg font-bold text-gray-900">${p.trades}</div></div>
            <div class="bg-gray-50 rounded-lg p-3 border border-gray-100"><div class="text-xs text-gray-500 uppercase tracking-wide">Issuers</div><div class="text-lg font-bold text-gray-900">${Object.keys(p.alloc).length}</div></div>
          </div>
        </div>
      </div>
      <div class="lg:col-span-9">
        <div class="border-b border-gray-200 mb-6">
          <nav class="-mb-px flex gap-8">
            <button id="tab-trades" onclick="switchTab('trades')" class="border-b-2 border-blue-600 text-blue-700 pb-3 px-1 text-sm font-medium transition">Trading Activity</button>
            <button id="tab-allocs" onclick="switchTab('allocs')" class="border-b-2 border-transparent text-gray-500 hover:text-gray-700 pb-3 px-1 text-sm font-medium transition">Allocations</button>

              <option value="All">All Types</option><option value="Purchase">Purchase</option><option value="Sale">Sale</option>
            </select>
          </div>
          <div class="bg-white border border-gray-200 rounded-b-xl overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200"><thead class="bg-gray-50"><tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Issuer</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Published</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Traded</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Filed After</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Size</th>
            </tr></thead><tbody id="tradeBody" class="bg-white divide-y divide-gray-200"></tbody></table>
          </div>
        </div>
        <div id="allocsPanel" style="display:none">
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm"><h3 class="text-lg font-bold text-gray-900 mb-4">Trade Activity Over Time</h3><div class="h-64"><canvas id="lineC"></canvas></div></div>

          </div>

            <table class="min-w-full divide-y divide-gray-200"><thead class="bg-gray-50"><tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ticker</th>

            </tr></thead><tbody id="allocBody" class="divide-y divide-gray-200"></tbody></table>
          </div>
        </div>
      </div>
    </div>
  `;
  renderTrades();switchTab('trades');
}

function renderTrades(){
  const q=document.getElementById('tradeSearch').value.toLowerCase().trim();
  const ty=document.getElementById('typeFilter').value;
  const rows=activePol.txs.filter(t=>{
    if(ty!=='All'&&t.order_type!==ty)return false;
    if(!q)return true;return t.asset.toLowerCase().includes(q)||t.ticker.toLowerCase().includes(q);
  });
  document.getElementById('tradeBody').innerHTML=rows.map(t=>{
    const ic=getIssuer(t.asset,t.ticker);
    const badge=t.order_type==='Purchase'?`<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 border border-green-200"><svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>Buy</span>`
      :t.order_type==='Sale'?`<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800 border border-red-200"><svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>Sale</span>`
      :`<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800 border border-gray-200">${t.order_type}</span>`;
    const aw=amountWidth(t.amount);
    return`
    <tr class="hover:bg-gray-50 transition">
      <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center"><div class="w-8 h-8 rounded-full ${ic.color} flex items-center justify-center text-xs font-bold mr-3">${initials(t.asset||t.ticker)}</div><div><div class="text-sm font-semibold text-gray-900">${t.asset}</div><div class="text-xs text-gray-500"><span class="bg-gray-100 px-1.5 py-0.5 rounded text-gray-600 font-medium">${t.ticker}</span></div></div></div></td>
      <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${t.date}</td>
      <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${t.traded}</td>
      <td class="px-6 py-4 whitespace-nowrap text-sm">${daysBetween(t.date,t.traded)}</td>
      <td class="px-6 py-4 whitespace-nowrap">${badge}</td>
      <td class="px-6 py-4 whitespace-nowrap"><div class="text-sm font-medium text-gray-900">${t.amount}</div><div class="w-24 bg-gray-200 rounded-full h-1.5 mt-1"><div class="bg-blue-600 h-1.5 rounded-full" style="width:${aw}%"></div></div></td>
    </tr>`}).join('');
}

function getIssuer(name,ticker){
  const colors=['bg-blue-100 text-blue-700','bg-green-100 text-green-700','bg-purple-100 text-purple-700','bg-orange-100 text-orange-700','bg-pink-100 text-pink-700','bg-indigo-100 text-indigo-700'];
  const seed=(name||ticker||'X');let h=0;for(let i=0;i<seed.length;i++)h=seed.charCodeAt(i)+((h<<5)-h);return{color:colors[Math.abs(h)%colors.length]}
}

function switchTab(tab){
  if(tab==='trades'){
    document.getElementById('tab-trades').className='border-b-2 border-blue-600 text-blue-700 pb-3 px-1 text-sm font-medium transition';
    document.getElementById('tab-allocs').className='border-b-2 border-transparent text-gray-500 hover:text-gray-700 pb-3 px-1 text-sm font-medium transition';
    document.getElementById('tradesPanel').style.display='block';document.getElementById('allocsPanel').style.display='none';
  }else{
    document.getElementById('tab-trades').className='border-b-2 border-transparent text-gray-500 hover:text-gray-700 pb-3 px-1 text-sm font-medium transition';
    document.getElementById('tab-allocs').className='border-b-2 border-blue-600 text-blue-700 pb-3 px-1 text-sm font-medium transition';
    document.getElementById('tradesPanel').style.display='none';document.getElementById('allocsPanel').style.display='block';
    renderAllocs();
  }
}

function renderAllocs(){
  const p=activePol;destroyCharts();
  const entries=Object.entries(p.alloc).sort((a,b)=>b[1]-a[1]);
  document.getElementById('allocBody').innerHTML=entries.map(([tk,pc])=>`
    <tr class="hover:bg-gray-50 transition">
      <td class="px-6 py-4 whitespace-nowrap text-sm font-mono font-semibold text-gray-900">${tk}</td>
      <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">${pc}%</td>
      <td class="px-6 py-4 whitespace-nowrap align-middle">
        <div class="w-full bg-gray-200 rounded-full h-2 max-w-xs"><div class="bg-blue-600 h-2 rounded-full" style="width:${pc}%"></div></div>
      </td>
    </tr>`).join('');

  const ctxL=document.getElementById('lineC').getContext('2d');
  charts.push(new Chart(ctxL,{type:'bar',data:{labels:p.years,datasets:[{label:'Disclosed trades',data:p.hist,backgroundColor:'#2563eb',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'#e2e8f0'},ticks:{color:'#64748b'}},x:{grid:{display:false},ticks:{color:'#64748b'}}}}}));

  let labels=[],vals=[],other=0;
  entries.forEach(([k,v],i)=>{if(i<10){labels.push(k);vals.push(v);}else{other+=v;}});
  if(other>0){labels.push('Other');vals.push(other);}
  const colors=['#2563eb','#059669','#d97706','#dc2626','#7c3aed','#0891b2','#be123c','#4f46e5','#0d9488','#84cc16','#94a3b8'];
  const ctxP=document.getElementById('pieC').getContext('2d');
  charts.push(new Chart(ctxP,{type:'doughnut',data:{labels:labels,datasets:[{data:vals,backgroundColor:colors.slice(0,labels.length),borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{color:'#475569',font:{size:10},boxWidth:10}}}}}));
}

function destroyCharts(){charts.forEach(c=>c.destroy());charts=[]}

init();
</script>
</body>
</html>
